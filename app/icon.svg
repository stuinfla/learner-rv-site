<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Cognitum Learn">
  <!-- Dark rounded-square background so the mark stands on light browser tabs -->
  <rect width="32" height="32" rx="7" fill="#020617"/>
  <!-- Outer amber ring (compass) -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#fcd34d" stroke-width="1.6" opacity="0.55"/>
  <!-- Inner cyan ring -->
  <circle cx="16" cy="16" r="6.5" fill="none" stroke="#38bdf8" stroke-width="1.6"/>
  <!-- Center amber-orange dot (the "seed") -->
  <circle cx="16" cy="16" r="2.6" fill="#fb923c"/>
  <!-- Cardinal tick marks -->
  <line x1="16" y1="2" x2="16" y2="4.4" stroke="#fcd34d" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="16" y1="27.6" x2="16" y2="30" stroke="#fcd34d" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="2" y1="16" x2="4.4" y2="16" stroke="#fcd34d" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="27.6" y1="16" x2="30" y2="16" stroke="#fcd34d" stroke-width="1.4" stroke-linecap="round"/>
</svg>
